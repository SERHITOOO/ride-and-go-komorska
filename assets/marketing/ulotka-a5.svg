  <rect x="0" y="0" width="1480" height="210" fill="#D9FF00"/>
  <text x="96" y="136" class="mono" font-size="46" fill="#050607">RIDE&amp;GO / KOMORSKA</text>
  
    <g transform="translate(96 310) scale(1)">
      <text x="0" y="105" class="tight" font-size="132" fill="#FFFFFF">Ride</text>
      <rect x="312" y="10" width="112" height="112" rx="18" fill="#D9FF00"/>
      <text x="368" y="103" text-anchor="middle" class="tight" font-size="116" fill="#050607">&amp;</text>
      <text x="444" y="105" class="tight" font-size="132" fill="#FFFFFF">Go</text>
      <text x="4" y="162" class="mono" font-size="26" fill="#A7AEA8">E-BIKE SHIFT RENTAL / KOMORSKA</text>
    </g>
  <text x="96" y="760" class="tight" font-size="116" fill="#FFFFFF">E-bike</text>
  <text x="96" y="890" class="tight" font-size="116" fill="#FFFFFF">na zmianę</text>
  <text x="96" y="1020" class="tight" font-size="116" fill="#D9FF00">kurierską.</text>
  
    <g transform="translate(96 1170)">
