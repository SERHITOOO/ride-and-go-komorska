  <text x="96" y="1648" class="black" font-size="48" fill="#FFFFFF">Glovo / Uber Eats / Wolt / Bolt Food</text>
  <text x="96" y="1738" class="sans" font-size="38" fill="#A7AEA8">Rower, ładowarka, zapięcie i przegląd startowy.</text>
  <rect x="96" y="1850" width="1288" height="122" rx="8" fill="#D9FF00"/>
  <text x="740" y="1928" text-anchor="middle" class="black" font-size="54" fill="#050607">+48 888 123 456</text>
  <text x="96" y="2048" class="sans" font-size="28" fill="#A7AEA8">Finalna kaucja, regulamin i modele Jobobike do potwierdzenia przed drukiem.</text>
