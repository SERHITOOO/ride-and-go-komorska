      <rect width="12" height="86" fill="#D9FF00"/>
      <text x="40" y="54" class="mono" font-size="27" fill="#A7AEA8">TYDZIEŃ</text>
      <text x="1118" y="54" text-anchor="end" class="black" font-size="36" fill="#FFFFFF">od 199 zł / tydz.</text>
    </g>
  
    <g transform="translate(96 1282)">
