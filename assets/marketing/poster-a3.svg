<svg xmlns="http://www.w3.org/2000/svg" width="297mm" height="420mm" viewBox="0 0 2970 4200" role="img" aria-label="Ride&amp;Go poster A3">

  <defs>
    <pattern id="scan" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M0 17.5h18" stroke="#1A1D1F" stroke-width="1"/>
    </pattern>
    <filter id="hardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="10" dy="10" stdDeviation="0" flood-color="#D9FF00" flood-opacity="1"/>
    </filter>
  </defs>

  <style>
    .sans { font-family: Inter, Arial, Helvetica, sans-serif; }
    .black { font-family: Inter, Arial, Helvetica, sans-serif; font-weight: 950; letter-spacing: -0.01em; }
    .tight { font-family: Inter, Arial, Helvetica, sans-serif; font-weight: 980; letter-spacing: -0.03em; }
    .mono { font-family: "SFMono-Regular", Consolas, Menlo, monospace; font-weight: 800; letter-spacing: .03em; }
  </style>
  <rect width="2970" height="4200" fill="#050607"/>
  <rect width="2970" height="4200" fill="url(#scan)" opacity=".76"/>
  <rect x="0" y="0" width="2970" height="420" fill="#D9FF00"/>
  <text x="190" y="262" class="mono" font-size="90" fill="#050607">RIDE&amp;GO / KOMORSKA / WYNAJEM</text>
  
    <g transform="translate(190 620) scale(1.9)">
      <text x="0" y="105" class="tight" font-size="132" fill="#FFFFFF">Ride</text>
      <rect x="312" y="10" width="112" height="112" rx="18" fill="#D9FF00"/>
      <text x="368" y="103" text-anchor="middle" class="tight" font-size="116" fill="#050607">&amp;</text>
      <text x="444" y="105" class="tight" font-size="132" fill="#FFFFFF">Go</text>
      <text x="4" y="162" class="mono" font-size="26" fill="#A7AEA8">E-BIKE SHIFT RENTAL / KOMORSKA</text>
    </g>
  <text x="190" y="1650" class="tight" font-size="250" fill="#FFFFFF">E-bike dla</text>
  <text x="190" y="1930" class="tight" font-size="250" fill="#FFFFFF">kuriera.</text>
  <text x="190" y="2210" class="tight" font-size="250" fill="#D9FF00">Bez zakupu.</text>
  
    <g transform="translate(96 2640)">
      <rect width="1160" height="86" fill="#050607" stroke="#303538" stroke-width="2"/>
      <rect width="12" height="86" fill="#D9FF00"/>
      <text x="40" y="54" class="mono" font-size="27" fill="#A7AEA8">TYDZIEŃ</text>
      <text x="1118" y="54" text-anchor="end" class="black" font-size="36" fill="#FFFFFF">od 199 zł / tydz.</text>
    </g>
  
    <g transform="translate(96 2800)">
      <rect width="1160" height="86" fill="#050607" stroke="#303538" stroke-width="2"/>
      <rect width="12" height="86" fill="#2E68FF"/>
      <text x="40" y="54" class="mono" font-size="27" fill="#A7AEA8">MIESIĄC</text>
      <text x="1118" y="54" text-anchor="end" class="black" font-size="36" fill="#FFFFFF">od 749 zł / mies.</text>
    </g>
  
    <g transform="translate(96 2960)">
      <rect width="1160" height="86" fill="#050607" stroke="#303538" stroke-width="2"/>
      <rect width="12" height="86" fill="#FF5C1A"/>
      <text x="40" y="54" class="mono" font-size="27" fill="#A7AEA8">ODBIÓR</text>
      <text x="1118" y="54" text-anchor="end" class="black" font-size="36" fill="#FFFFFF">Komorska 55, Warszawa</text>
    </g>
  <rect x="190" y="3380" width="1720" height="210" rx="10" fill="#D9FF00"/>
  <text x="1050" y="3514" text-anchor="middle" class="black" font-size="94" fill="#050607">+48 888 123 456</text>
  <text x="2070" y="3514" class="black" font-size="94" fill="#FFFFFF">ridego.pl</text>
  <text x="190" y="3860" class="sans" font-size="58" fill="#A7AEA8">Glovo / Uber Eats / Wolt / Bolt Food. Warunki najmu przed odbiorem.</text>
</svg>
